name: Native Module Rebuild Check

# Verifies that better-sqlite3's native binding builds and loads under the
# supported runtime. DayZ AIO intentionally supports Node 20.x only on Windows
# because the local portable runtime and native ABI are pinned to Node 20.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  NODE_VERSION: "20.20.2"
  PNPM_VERSION: "9.15.9"

jobs:
  rebuild-check:
    name: better-sqlite3 on ${{ matrix.os }} / Node 20.20.2
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate pnpm lockfile integrity
        run: node scripts/ci/check-pnpm-lockfile.mjs

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js 20.20.2
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install workspace dependencies (triggers native build)
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo "::warning::pnpm-lock.yaml is missing. Running --no-frozen-lockfile for this transitional branch."
            pnpm install --no-frozen-lockfile
          fi

      - name: Verify better-sqlite3 loads and can query
        run: pnpm --filter @dayz-aio/backend exec node -e "const db = require('better-sqlite3')(':memory:'); db.prepare('SELECT 1 AS ok').get(); console.log('better-sqlite3 OK on', process.version, process.platform, process.arch);"

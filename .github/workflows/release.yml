name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  NODE_VERSION: "20.20.2"
  PNPM_VERSION: "9.15.9"

jobs:
  release:
    name: Build, verify and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Enforce pnpm lockfile for releases
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            echo "::error::package-lock.json must not be present in a pnpm release."
            exit 1
          fi
          if [ ! -f pnpm-lock.yaml ]; then
            echo "::error::pnpm-lock.yaml is required for releases. Run Generate pnpm Lockfile and commit the result before tagging."
            exit 1
          fi

      - name: Validate pnpm lockfile integrity
        run: node scripts/ci/check-pnpm-lockfile.mjs

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js 20.20.2
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all workspaces
        run: pnpm -r run build

      - name: Run backend test suite
        run: pnpm --filter @dayz-aio/backend test

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Locate matching IMPLEMENTED changelog
        id: changelog
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          doc=$(ls docs/IMPLEMENTED_v${version}_*.md 2>/dev/null | head -n 1 || true)
          if [ -z "$doc" ]; then
            echo "::warning::No docs/IMPLEMENTED_v${version}_*.md found. Add one before tagging next time."
            body="No changelog file found for v${version}. See commit history for details."
          else
            body=$(cat "$doc")
          fi
          {
            echo "body<<EOF_CHANGELOG"
            echo "$body"
            echo "EOF_CHANGELOG"
          } >> "$GITHUB_OUTPUT"

      - name: Package source archive
        run: |
          version="${{ steps.version.outputs.version }}"
          git archive --format=zip --prefix=dayz-aio/ -o "dayz-aio-v${version}.zip" HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DayZ AIO v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: dayz-aio-v${{ steps.version.outputs.version }}.zip

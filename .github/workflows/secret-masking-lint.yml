name: Secret Masking Lint

on:
  push:
    branches: [main, master]
    paths:
      - "apps/backend/src/shared/env.ts"
      - "apps/backend/src/modules/debug/masking.ts"
      - "scripts/ci/check-secret-masking.mjs"
  pull_request:
    paths:
      - "apps/backend/src/shared/env.ts"
      - "apps/backend/src/modules/debug/masking.ts"
      - "scripts/ci/check-secret-masking.mjs"
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  NODE_VERSION: "20.20.2"

jobs:
  check-masking:
    name: Verify sensitive env vars are masked
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20.20.2
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run secret-masking check
        run: node scripts/ci/check-secret-masking.mjs

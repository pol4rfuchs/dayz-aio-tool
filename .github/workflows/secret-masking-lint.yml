name: Secret Masking Lint

# Runs whenever env.ts or masking.ts change, to catch a new sensitive env
# var (API key, secret, password, token) that has no corresponding masking
# rule before it ever ships in a Debug Bundle export.

on:
  push:
    branches: [main, master]
    paths:
      - "apps/backend/src/shared/env.ts"
      - "apps/backend/src/modules/debug/masking.ts"
  pull_request:
    paths:
      - "apps/backend/src/shared/env.ts"
      - "apps/backend/src/modules/debug/masking.ts"
  workflow_dispatch:

jobs:
  check-masking:
    name: Verify sensitive env vars are masked
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Run secret-masking check
        run: node scripts/ci/check-secret-masking.mjs

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  NODE_VERSION: "20.20.2"
  PNPM_VERSION: "9.15.9"

jobs:
  lockfile-hygiene:
    name: Lockfile Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject stale npm lockfile
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            echo "::error::package-lock.json is stale. This repository uses pnpm; delete package-lock.json and commit pnpm-lock.yaml."
            exit 1
          fi

      - name: Warn when pnpm lockfile is absent
        shell: bash
        run: |
          if [ ! -f pnpm-lock.yaml ]; then
            echo "::warning::pnpm-lock.yaml is missing. Run the Generate pnpm Lockfile workflow or run pnpm install with Node 20.20.2 and commit pnpm-lock.yaml."
          fi

  build-test:
    name: Build & Test (Node 20.20.2)
    runs-on: ubuntu-latest
    needs: lockfile-hygiene
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js 20.20.2
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo "::warning::pnpm-lock.yaml is missing. Running --no-frozen-lockfile so this branch can generate the lockfile; commit pnpm-lock.yaml before release."
            pnpm install --no-frozen-lockfile
          fi

      - name: Build all workspaces (backend, frontend, shared)
        run: pnpm -r run build

      - name: Run backend test suite
        run: pnpm --filter @dayz-aio/backend test

      - name: Typecheck / build frontend
        run: pnpm --filter @dayz-aio/frontend run build

      - name: Upload build output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-node-20.20.2
          path: |
            apps/backend/dist
            apps/frontend/dist
          if-no-files-found: ignore

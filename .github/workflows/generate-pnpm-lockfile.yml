name: Generate pnpm Lockfile

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  NODE_VERSION: "20.20.2"
  PNPM_VERSION: "9.15.9"

jobs:
  generate-lockfile:
    name: Generate pnpm-lock.yaml and remove npm lockfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js 20.20.2
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Remove stale npm lockfile and generate pnpm lockfile only
        shell: bash
        run: |
          rm -f package-lock.json
          pnpm install --lockfile-only --no-frozen-lockfile
          test -f pnpm-lock.yaml

      - name: Commit generated lockfile
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git rm -f package-lock.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No lockfile changes to commit."
          else
            git commit -m "chore: generate pnpm lockfile"
            git push
          fi

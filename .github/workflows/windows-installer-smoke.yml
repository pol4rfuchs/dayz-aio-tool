name: Windows Installer Smoke Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  DAYZ_AIO_NODE20_VERSION: "20.20.2"

jobs:
  windows-install-smoke:
    name: install-windows.bat on a clean runner
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Assert no stale npm lockfile
        shell: pwsh
        run: |
          if (Test-Path "package-lock.json") { throw "package-lock.json is stale. This repo uses pnpm; remove it." }

      - name: Run install-windows.bat
        shell: cmd
        run: install-windows.bat

      - name: Expose portable Node 20 to later CI steps
        shell: pwsh
        run: |
          . .\scripts\windows\ensure-node.ps1
          $nodeInfo = Ensure-Node20 -NoDownload
          $nodeDir = Split-Path -Parent $nodeInfo.Path
          if (-not $nodeInfo.Version.StartsWith("20.")) { throw "Expected portable Node 20.x after installer bootstrap, got $($nodeInfo.Version) at $($nodeInfo.Path)" }
          Add-Content -Path $env:GITHUB_PATH -Value $nodeDir
          Write-Host "Portable Node runtime selected: $($nodeInfo.Version) at $nodeDir"

      - name: Verify selected Node runtime is exactly 20.x
        shell: pwsh
        run: |
          $nodePath = (Get-Command node -ErrorAction Stop).Source
          $nodeVersion = (& $nodePath -p "process.versions.node").Trim()
          if (-not $nodeVersion.StartsWith("20.")) { throw "Expected Node 20.x after installer bootstrap, got $nodeVersion at $nodePath" }
          Write-Host "Node runtime OK: $nodeVersion at $nodePath"

      - name: Verify apps/backend/.env was generated with strong secrets
        shell: pwsh
        run: |
          $envFile = "apps/backend/.env"
          if (-not (Test-Path $envFile)) { throw "$envFile was not generated by the installer." }
          $content = Get-Content $envFile -Raw
          if ($content -notmatch "DAYZ_AIO_API_KEY=.{24,}") { throw "DAYZ_AIO_API_KEY missing or shorter than 24 chars." }
          if ($content -notmatch "DAYZ_AIO_SECRET_KEY=.{32,}") { throw "DAYZ_AIO_SECRET_KEY missing or shorter than 32 chars." }
          Write-Host "Generated .env passed the strong-secret check."

      - name: Run doctor-windows.bat
        shell: cmd
        run: doctor-windows.bat

      - name: Run offline smoke-test-windows.bat
        shell: cmd
        run: smoke-test-windows.bat -Offline

      - name: Upload install/runtime logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-install-logs
          path: logs/
          if-no-files-found: ignore
